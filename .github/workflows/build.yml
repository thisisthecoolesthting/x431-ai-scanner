name: Build APK

on:
  push:
    branches: [ main, master, spike/direct-vci ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the rolling 'latest' release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.13

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK with build number
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/x431-ai-scanner-${{ github.run_number }}.apk

      # Workflow artifact â€” downloadable from the Actions run page (any branch / any push).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: x431-ai-scanner-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Rolling 'latest' release â€” stable URL the tablet can auto-update from.
      # Only on pushes to main/master, not on PRs.
      - name: Publish to 'latest' release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          body: |
            Build #${{ github.run_number }} from commit ${{ github.sha }}.
            Direct install URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/latest/app-debug.apk
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/x431-ai-scanner-${{ github.run_number }}.apk
          prerelease: true
